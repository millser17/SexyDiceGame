<!DOCTYPE html>
<html>
<head>
    <title>Dice Music</title>
</head>
<body>

<h1>Dice Music</h1>

<div id="setup">

    <input id="p1" placeholder="Player 1 Name">
    <br><br>

    <select id="p1Song"></select>

    <br><br>

    <input id="p2" placeholder="Player 2 Name">
    <br><br>

    <select id="p2Song"></select>

    <br><br>

    <button id="startBtn">Start Game</button>

</div>

<hr>

<div id="game" style="display:none;">

    <h2 id="activePlayer"></h2>

    <button id="rollBtn">Roll Dice</button>

    <p id="output"></p>
    <p id="counter"></p>

    <h3>Now Playing</h3>
    <p id="nowPlaying"></p>

    <h3>Queue</h3>
    <ul id="queueList"></ul>

    <audio id="player" controls></audio>

</div>

<script src="script.js"></script>

</body>
</html>
