<!DOCTYPE html>
<html>
<head>
    <title>Dice Music</title>
</head>
<body>

    <h1>Dice Music</h1>

    <div id="setup">

        <div>
            <input id="p1" placeholder="Player 1 Name">
        </div>

        <br>

        <div>
            <input id="p2" placeholder="Player 2 Name">
        </div>

        <br>

        <div>
            <label for="songSelect">Starting Song:</label>

            <select id="songSelect">
                <option value="0">Song 1</option>
                <option value="1">Song 2</option>
            </select>
        </div>

        <br>

        <button id="startBtn">
            Start Game
        </button>

    </div>

    <hr>

    <div id="game" style="display:none;">

        <h2 id="activePlayer">
            Current Player
        </h2>

        <button id="rollBtn">
            Roll Dice
        </button>

        <p id="output">
            Roll result will appear here
        </p>

        <p id="counter">
            Roll Count: 0
        </p>

        <audio id="player" controls></audio>

    </div>

    <script src="script.js"></script>

</body>
</html>
